<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hygia | Premium Cleaning & Supplies</title>
    <style>
        @import url('[https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Oswald:wght@500;700&display=swap](https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Oswald:wght@500;700&display=swap)');

        :root {
            --primary: #001a2c;
            --accent: #00d1ff;
            --success: #00ff88;
            --bg: #0f172a; /* Fondo oscuro premium estilo cyberpunk */
            --card-bg: #1e293b;
            --text-light: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-light); overflow-x: hidden; }

        header {
            background: rgba(0, 26, 44, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 209, 255, 0.2);
        }

        .brand { font-family: 'Oswald', sans-serif; font-size: 1.8rem; letter-spacing: 2px; text-transform: uppercase; }
        .brand span { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        .cart-trigger {
            background: var(--accent);
            color: var(--primary);
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .cart-trigger:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--accent); }

        .hero {
            padding: 6rem 5% 4rem;
            text-align: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .hero h1 { font-family: 'Oswald', sans-serif; font-size: 3.5rem; margin-bottom: 1rem; color: white; }
        .hero p { color: var(--accent); font-weight: 600; letter-spacing: 1px; }

        .container { padding: 2rem 5%; max-width: 1400px; margin: auto; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .icon-box {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            display: block;
        }

        .category { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem; }
        .price { font-size: 2rem; font-weight: 700; color: white; margin: 1.5rem 0; }
        
        .btn-add {
            width: 100%;
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-add:hover { background: var(--accent); color: var(--primary); }

        /* Admin floating button */
        .admin-fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #334155;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: none;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">HYGIA<span>CORE</span></div>
    <button class="cart-trigger" onclick="verPedido()">
        CARRITO (<span id="cart-count">0</span>)
    </button>
</header>

<section class="hero">
    <h1>QUÍMICA HYGIA</h1>
    <p>DISTRIBUCIÓN DIRECTA DE FÁBRICA</p>
</section>

<div class="container">
    <div class="grid" id="main-grid"></div>
</div>

<button class="admin-fab" onclick="alert('Iniciando Panel Admin...')">⚙️</button>

<script>
    // Datos integrados de image_3b53bd.jpg
    const productos = [
        { id: 1, cat: "PROMO", name: "Combo Marzo", price: 22000, icon: "🔥", desc: "Jabón + Suavizante + Lavandina + Detergente + Papel" },
        { id: 2, cat: "LAVADO", name: "Jabón Líquido", price: 2800, icon: "🧴", desc: "Tipo Ariel o Skip - 5 Litros" },
        { id: 3, cat: "LAVADO", name: "Pastas Concentradas", price: 35000, icon: "🧪", desc: "Rinden 100 Ltrs Totales" },
        { id: 4, cat: "PAPEL", name: "Papel Higiénico Jumbo", price: 4200, icon: "🧻", desc: "Línea Institucional - 2kg" },
        { id: 5, cat: "LIMPIEZA", name: "Limpiador de Piso", price: 1800, icon: "🌿", desc: "Concentrado rinde 5L" }
    ];

    let cart = [];

    function render() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = productos.map(p => `
            <div class="product-card">
                <span class="category">${p.cat}</span>
                <span class="icon-box">${p.icon}</span>
                <h3>${p.name}</h3>
                <p style="color: var(--text-dim); font-size: 0.9rem; margin-top: 0.5rem">${p.desc}</p>
                <div class="price">$${p.price.toLocaleString()}</div>
                <button class="btn-add" onclick="addToCart(${p.id})">AÑADIR AL PEDIDO</button>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const p = productos.find(x => x.id === id);
        cart.push(p);
        document.getElementById('cart-count').innerText = cart.length;
        
        // Animación de feedback
        event.target.innerText = "AGREGADO ✓";
        event.target.style.borderColor = "var(--success)";
        event.target.style.color = "var(--success)";
        
        setTimeout(() => {
            event.target.innerText = "AÑADIR AL PEDIDO";
            event.target.style.borderColor = "var(--accent)";
            event.target.style.color = "var(--accent)";
        }, 1000);
    }

    function verPedido() {
        if(cart.length === 0) return alert("El carrito está vacío");
        const resumen = cart.map(i => `- ${i.name} ($${i.price})`).join('\n');
        const total = cart.reduce((acc, i) => acc + i.price, 0);
        alert(`RESUMEN DE PEDIDO:\n\n${resumen}\n\nTOTAL: $${total}\n\nRedirigiendo a WhatsApp...`);
    }

    render();
</script>

</body>
</html>
